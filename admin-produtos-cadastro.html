<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <meta name="author" content="Bernardo Sonza De Cesaro">
        <meta name="keywords" content="Senai, SENAI, Projeto, Projeto Final, Ecommerce">

        <title>Admin - Produtos</title>

        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet"/>
    </head>

    <body class="min-h-screen w-full flex flex-col bg-gradient-to-r from-cyan-500 to-blue-500 font-helvetic text-black dark:text-white" data-componente="corpo-admin-produtos">

        <header data-componente="header-principal" class="w-full z-40">
            <nav data-elemento="nav-superior" class="bg-white px-4 lg:px-6 py-2.5 dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700">
                <div class="flex flex-wrap justify-between items-center mx-auto max-w-screen-3xl">

                    <a href="index.html" data-elemento="link-logo" class="flex items-center">
                        <img src="logo-preta-100p51.png" class="mr-3 h-9 block dark:hidden" alt="Logo Loja"/>
                        <img src="logo-branca-100p52.png" class="mr-3 h-9 hidden dark:block" alt="Logo Loja"/>
                        <span class="self-center text-xl font-semibold whitespace-nowrap dark:text-white hidden sm:block">
                            Loja
                        </span>
                    </a>

                    <div data-elemento="bloco-usuario" class="flex items-center lg:order-2">
                        <a href="login.html" data-elemento="botao-login" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 lg:px-5 py-2 lg:py-2.5 mr-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 transition-colors">
                            Fazer Login
                        </a>
                        <button type="button"
                                id="user-menu-button"
                                data-elemento="botao-avatar"
                                data-dropdown-toggle="dropdown-usuario"
                                aria-expanded="false"
                                class="hidden flex mx-3 text-sm bg-gray-800 rounded-full md:mr-0 focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600">
                            <span class="sr-only">
                                Abrir Menu Usuário
                            </span>
                            <img class="w-8 h-8 rounded-full object-cover" src="https://flowbite.com/docs/images/people/profile-picture-5.jpg" alt="Foto do usuário">
                        </button>
                    </div>

                    <div id="dropdown-usuario" data-componente="dropdown-usuario" class="hidden z-50 my-4 w-56 text-base list-none bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700 dark:divide-gray-600">
                        <div class="py-3 px-4">
                            <span class="block text-sm font-semibold text-gray-900 dark:text-white" data-elemento="nome-usuario-logado">
                                Usuário
                            </span>
                            <span class="block text-sm text-gray-500 truncate dark:text-gray-400" data-elemento="email-usuario-logado">
                                usuario@email.com
                            </span>
                        </div>
                        <ul class="py-1 text-gray-500 dark:text-gray-400" aria-labelledby="user-menu-button">
                            <li>
                                <a href="#" data-elemento="link-perfil" class="block py-2 px-4 text-sm hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                                    Meu Perfil
                                </a>
                            </li>
                            <li>
                                <a href="#" data-elemento="link-configuracoes" class="block py-2 px-4 text-sm hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                                    Configurações da Conta
                                </a>
                            </li>
                        </ul>
                        <ul class="py-1 text-gray-500 dark:text-gray-400">
                            <li>
                                <a href="#" data-elemento="link-favoritos" class="block py-2 px-4 text-sm hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                                    Favoritos
                                </a>
                            </li>
                        </ul>
                        <ul id="lista-links-admin" class="hidden py-1 text-gray-500 dark:text-gray-400">
                            <li>
                                <a href="admin-produtos-consulta.html" data-elemento="link-admin-produtos" class="block py-2 px-4 text-sm hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                                    Gerenciar Produtos
                                </a>
                            </li>
                            <li>
                                <a href="admin-usuarios-consulta.html" data-elemento="link-admin-usuarios" class="block py-2 px-4 text-sm hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                                    Gerenciar Usuários
                                </a>
                            </li>
                        </ul>
                        <ul class="py-1 text-gray-500 dark:text-gray-400">
                            <li>
                                <a href="#" data-elemento="link-sair" class="block py-2 px-4 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-gray-600 dark:text-red-400 dark:hover:text-white">
                                    Sair da conta
                                </a>
                            </li>
                        </ul>
                    </div>

                </div>
            </nav>
        </header>

        <nav data-componente="nav-admin" class="bg-gray-100 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 lg:px-6 py-3">
            <div class="max-w-screen-3xl mx-auto flex flex-wrap items-center justify-between gap-2">
                <div class="flex items-center gap-4">
                    <span class="font-bold text-lg text-gray-900 dark:text-white">
                        Painel Admin
                    </span>
                    
                    <a href="admin-produtos-consulta.html" data-elemento="link-admin-produtos" class="font-medium text-blue-600 dark:text-blue-400">
                        Produtos
                    </a>
                    
                    <a href="admin-usuarios-consulta.html" data-elemento="link-admin-usuarios" class="font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600">
                        Usuários
                    </a>
                </div>
            </div>
        </nav>

        <main data-componente="conteudo-principal" class="flex-1 p-6 lg:p-10 max-w-screen-xl mx-auto w-full">
            <section data-componente="bloco-formulario" class="lg:col-span-1 bg-white dark:bg-gray-800 rounded-lg shadow-sm p-6 h-fit">
                <div class="mx-auto">
                    <div id="alerta-sucesso" data-elemento="alerta-sucesso" class="hidden">
                        <div class="flex items-start sm:items-center p-4 mb-4 text-sm bg-green-300/20 text-green-800 e dark:bg-green-900/30 dark:text-green-400 rounded-lg" role="alert">
                            <svg class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                            <p>
                                <span class="font-medium me-1">
                                    Produto salvo com sucesso!
                                </span>
                            </p>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-4">
                        <h2 id="titulo-formulario" class="mb-4 text-xl font-bold text-gray-900 dark:text-white">
                            Cadastrar Produto
                        </h2>

                        <a href="admin-produtos-consulta.html"
                           data-elemento="botao-novo-produto"
                           class="inline-flex items-center gap-1.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 rounded-lg px-4 py-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors">
                            Voltar
                        </a>
                    </div>
                    
                    <form id="formulario-produto" data-elemento="formulario-produto" class="space-y-4">
                        <input type="hidden" id="produto-id">
                        <input type="hidden" id="produto-rev">
                            
                        <div data-elemento="grupo-input-nome">
                            <label for="produto-nome" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Nome do Produto
                            </label>
                            <input type="text"
                                   id="produto-nome"
                                   data-elemento="input-nome-produto"
                                   class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                   placeholder="Digite o Nome do Produto"
                                   required="">
                        </div>

                        <div data-elemento="grupo-input-categoria">
                            <label for="produto-categoria" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Categoria
                            </label>
                            <select id="produto-categoria"
                                    data-elemento="select-categoria-produto"
                                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                    required="">
                                <option value="" selected disabled>Selecione a Categoria do Produto</option>
                                <option value="Roupas">Roupas</option>
                                <option value="Acessórios">Acessórios</option>
                                <option value="Maquiagens">Maquiagens</option>
                                <option value="Cosméticos">Cosméticos</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>

                        <div data-elemento="grupo-input-preco">
                            <label for="produto-preco" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Preço (R$)
                            </label>
                            <input type="number"
                                   id="produto-preco"
                                   data-elemento="input-preco-produto"
                                   min="0"
                                   step="0.01"
                                   class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                   placeholder="Digite o Preço do Produto"
                                   required="">
                        </div>

                        <div data-elemento="grupo-input-imagem">
                            <label for="produto-imagem" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                URL da Imagem
                            </label>
                            <input type="url"
                                   id="produto-imagem"
                                   data-elemento="input-imagem-produto"
                                   class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                   placeholder="https://..."
                                   required="">
                        </div>

                        <div data-elemento="grupo-input-descricao">
                            <label for="produto-descricao" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Descrição
                            </label>
                            <textarea id="produto-descricao"
                                      data-elemento="textarea-descricao-produto"
                                      rows="5"
                                      class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-600 focus:border-blue-600 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                      placeholder="Digite a Descrição do Produto"
                                      required=""></textarea>
                        </div>
                        
                        <div class="flex gap-2">
                            <button type="submit"
                                    id="btn-salvar"
                                    data-elemento="botao-salvar-produto"
                                    class="flex-1 inline-flex items-center justify-center px-5 py-2.5 text-sm font-medium text-center text-white bg-blue-600 hover:bg-blue-700 rounded-lg focus:ring-4 focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors">
                                Adicionar Produto
                            </button>
                            <button type="button"
                                    id="btn-cancelar-edicao"
                                    data-elemento="botao-cancelar-edicao"
                                    class="hidden items-center justify-center px-5 py-2.5 text-sm font-medium text-center text-white bg-red-500 hover:bg-red-600 rounded-lg focus:ring-4 focus:ring-red-300 dark:bg-red-500 dark:hover:bg-red-600 dark:focus:ring-blue-800 transition-colors">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
        <script type="module" src="admin-produtos-cadastro.js"></script>
    </body>
</html>
