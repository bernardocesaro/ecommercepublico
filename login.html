<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <meta name="author" content="Bernardo Sonza De Cesaro">
        <meta name="keywords" content="Senai, SENAI, Projeto, Projeto Final, Ecommerce">

        <title>Faça Login na Loja</title>

        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet"/>
    </head>

    <body class="min-h-screen w-full bg-gradient-to-r from-cyan-500 to-blue-500 font-helvetic text-black dark:text-white" data-componente="corpo-login">
        <section data-componente="tela-login" class="flex flex-col items-center justify-center min-h-screen px-6 py-8 mx-auto">
            <div data-elemento="card-login" class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
                <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                    <h1 class="text-2xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white" data-elemento="titulo-login">
                        Faça login na sua conta
                    </h1>

                    <div id="alerta-erro" data-elemento="alerta-erro" class="hidden">
                        <div class="flex items-start sm:items-center p-4 mb-4 text-sm bg-red-300/20 text-red-800 e dark:bg-red-900/30 dark:text-red-400 rounded-lg" role="alert">
                            <svg class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                            <p>
                                <span class="font-medium me-1">
                                    E-mail ou senha incorretos!
                                </span>
                                Por favor, tente novamente.
                            </p>
                        </div>
                    </div>

                    
                    <form id="form-login" data-elemento="formulario-login" class="space-y-4 md:space-y-6" action="#">
                        <div data-elemento="grupo-input-email">
                            <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Seu E-mail
                            </label>
                            <input type="email" 
                                   name="email" 
                                   id="email" 
                                   data-elemento="input-email"
                                   class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                                   placeholder="seu.email.aqui@email.com" 
                                   required="">
                        </div>
                        
                        <div data-elemento="grupo-input-senha">
                            <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Sua Senha
                            </label>
                            <input type="password" 
                                   name="password" 
                                   id="password" 
                                   data-elemento="input-senha"
                                   placeholder="••••••••" 
                                   class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                                   required="">
                        </div>
                        
                        <button type="submit" 
                                data-elemento="botao-enviar"
                                class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors">
                            Entrar
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
        
        <script type="module" src="login.js"></script>
    </body>
</html>
